name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build
        run: |
          mkdir -p _site
          for dir in */; do
            name=$(basename "$dir")
            mkdir -p "_site/$name"
            if [ -d "$dir/01" ] || [ -d "$dir/02" ] || [ -d "$dir/03" ]; then
              for subdir in "$dir"*/; do
                if [ -d "$subdir" ]; then
                  cp -r "$subdir" "_site/$name/"
                fi
              done
            else
              cp -r "$dir"*.html "$dir"*.css "$dir"*.js "_site/$name/" 2>/dev/null || true
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
