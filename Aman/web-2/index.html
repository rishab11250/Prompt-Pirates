<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowState | Refined Fleet</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
</head>
<body>
    <audio id="bg-music" loop>
        <source src="gr0za-trap-trap-beat-beats-503817.mp3" type="audio/mpeg">
    </audio>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <nav class="navbar" id="mainNav">
        <div class="nav-container">
            <div class="logo">FLOW<span class="accent">STATE</span></div>
            
            <div class="nav-right">
                <div class="nav-status">
                    <span class="pulse"></span> 
                    <span class="current-car">01 / 09</span>
                </div>
                <button class="menu-btn">
                    <span></span>
                    <span></span>
                </button>
                <button class="music-btn">🔊</button>
            </div>
        </div>
    </nav>

    <main class="snap-container">
        <section class="car-section" style="background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=2000')">
            <div class="caption"><h1>PORSCHE 911</h1></div>
        </section>

        <section class="car-section" style="background-image: url('https://images.unsplash.com/photo-1503736334956-4c8f8e92946d?auto=format&fit=crop&w=1200&q=80')">
            <div class="caption"><h1>CARBON ELITE</h1></div>
        </section>

        <section class="car-section" style="background-image: url('https://images.unsplash.com/photo-1511919884226-fd3cad34687c?q=80&w=2000')">
            <div class="caption"><h1>BMW M-POWER</h1></div>
        </section>

        <section class="car-section" style="background-image: url('https://images.unsplash.com/photo-1519641471654-76ce0107ad1b?auto=format&fit=crop&w=1200&q=80')">
            <div class="caption"><h1>TRACK VISION</h1></div>
        </section>

        <section class="car-section" style="background-image: url('https://images.unsplash.com/photo-1502877338535-766e1452684a?q=80&w=2000')">
            <div class="caption"><h1>PHANTOM DRIVE</h1></div>
        </section>

        <section class="car-section" style="background-image: url('https://images.unsplash.com/photo-1525609004556-c46c7d6cf023?auto=format&fit=crop&w=1200&q=80')">
            <div class="caption"><h1>ITALIAN SOUL</h1></div>
        </section>

        <section class="car-section" style="background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1200&q=80')">
            <div class="caption"><h1>AERODYNAMIC</h1></div>
        </section>

        <section class="car-section" style="background-image: url('https://cdn.pixabay.com/photo/2016/11/29/09/32/auto-1868726_1280.jpg')">
            <div class="caption"><h1>PURE HERITAGE</h1></div>
        </section>

        <section class="car-section" style="background-image: url('https://cdn.pixabay.com/photo/2017/03/27/14/56/car-2179220_1280.jpg')">
            <div class="caption"><h1>BESPOKE LUXURY</h1></div>
        </section>

        <footer class="main-footer">
            <div class="footer-content">
                <h2>FLOWSTATE</h2>
                <div class="socials"><span>INSTAGRAM</span> / <span>X</span> / <span>YOUTUBE</span></div>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
